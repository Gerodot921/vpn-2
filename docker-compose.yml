version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/amnezia
      - SSH_HOST
      - SSH_USER
      - SSH_KEY_PATH
      - WIREGUARD_DOCKER_CONTAINER
      - WIREGUARD_INTERFACE_NAME
      - WIREGUARD_ENDPOINT_HOST
      - WIREGUARD_ENDPOINT_PORT
      - DEBUG_NETWORK=1
    volumes:
      - ./backend.db:/srv/app/backend.db
    ports:
      - 8000:8000
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: amnezia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data

  nginx:
    image: nginx:stable
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    ports:
      - 80:80
      - 443:443
    depends_on:
      - backend

volumes:
  db_data:
