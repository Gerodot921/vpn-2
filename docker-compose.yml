services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: vpn_postgres
    environment:
      POSTGRES_DB: vpn_db
      POSTGRES_USER: vpn_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn_user -d vpn_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vpn_network

  # FastAPI backend (billing, auth, API)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vpn_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vpn_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vpn_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      XRAY_API_HOST: xray
      XRAY_API_PORT: 10085
      XRAY_ADMIN_SECRET: ${XRAY_ADMIN_SECRET}
      VPN_ENDPOINT_HOST: ${VPN_ENDPOINT_HOST}
      VPN_ENDPOINT_PORT: ${VPN_ENDPOINT_PORT:-443}
      SUBSCRIPTION_API_URL: http://backend:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./app:/app/app
    networks:
      - vpn_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Telegram bot (payments + access issuance)
  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vpn_bot
    command: ["xray-bot"]
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      three-x-ui:
        condition: service_started
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      PAYMENT_PROVIDER_TOKEN: ${PAYMENT_PROVIDER_TOKEN:-}
      BILLING_CURRENCY: ${BILLING_CURRENCY:-USD}
      TELEGRAM_MINI_APP_URL: ${TELEGRAM_MINI_APP_URL:-http://backend:8000/miniapp}
      THREE_X_UI_HOST: three-x-ui
      THREE_X_UI_PORT: 2053
      THREE_X_UI_BASE_PATH: ${THREE_X_UI_BASE_PATH:-}
      THREE_X_UI_USERNAME: ${THREE_X_UI_USERNAME:-admin}
      THREE_X_UI_PASSWORD: ${THREE_X_UI_PASSWORD:-admin123}
      THREE_X_UI_INBOUND_TAG: ${THREE_X_UI_INBOUND_TAG:-bot-vless}
      THREE_X_UI_INBOUND_PORT: ${THREE_X_UI_INBOUND_PORT:-11000}
      THREE_X_UI_INBOUND_PROTOCOL: ${THREE_X_UI_INBOUND_PROTOCOL:-vless}
      VPN_ENDPOINT_HOST: ${VPN_ENDPOINT_HOST}
      VPN_ENDPOINT_PORT: ${VPN_ENDPOINT_PORT:-11000}
      XRAY_API_HOST: xray
      XRAY_API_PORT: 10085
      XRAY_ADMIN_SECRET: ${XRAY_ADMIN_SECRET}
    volumes:
      - ./app:/app/app
    networks:
      - vpn_network
    healthcheck:
      disable: true

  # Xray VPN server
  xray:
    image: teddysun/xray:latest
    container_name: vpn_xray
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
      - xray_data:/var/lib/xray
    ports:
      - "${VLESS_PORT:-10000}:${VLESS_PORT:-10000}/tcp"
      - "${VMESS_PORT:-10001}:${VMESS_PORT:-10001}/tcp"
      - "${TROJAN_PORT:-10002}:${TROJAN_PORT:-10002}/tcp"
      - "10085:10085/tcp"  # gRPC API port
    networks:
      - vpn_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pidof xray >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 3x-ui (web panel for Xray management)
  three-x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: vpn_three_x_ui
    ports:
      - "7654:2053"  # Internal 3x-ui port
      - "11000:11000"  # Purchased VPN inbound (bot-managed VLESS server)
    volumes:
      - three_x_ui_data:/etc/x-ui
    environment:
      XRAY_LOG_DIR: /var/log/xray
      TZ: UTC
    networks:
      - vpn_network
    restart: unless-stopped
    depends_on:
      - xray

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: vpn_nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.xray.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - vpn_network
    depends_on:
      - backend
      - three-x-ui
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  xray_data:
  three_x_ui_data:

networks:
  vpn_network:
    driver: bridge
