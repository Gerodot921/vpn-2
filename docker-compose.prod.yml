version: '3.8'
services:
  backend:
    image: user/amnezia-backend:latest
    environment:
      - DATABASE_URL=postgresql://postgres:POSTGRES_PASSWORD@db:5432/amnezia
      - SSH_HOST
      - SSH_USER
      - SSH_KEY_PATH
      - WIREGUARD_DOCKER_CONTAINER
      - WIREGUARD_INTERFACE_NAME
      - WIREGUARD_ENDPOINT_HOST
      - WIREGUARD_ENDPOINT_PORT
      - DEBUG_NETWORK=0
      - JWT_SECRET
      - ADMIN_USER
      - ADMIN_PASS
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: amnezia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:stable
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    ports:
      - 80:80
      - 443:443
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
