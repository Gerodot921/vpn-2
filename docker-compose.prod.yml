services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: amnezia-backend:local
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/amnezia
      - SSH_HOST
      - SSH_USER
      - SSH_KEY_PATH
      - WIREGUARD_DOCKER_CONTAINER=amnezia-awg
      - WIREGUARD_INTERFACE_NAME=wg0
      - WIREGUARD_ENDPOINT_HOST
      - WIREGUARD_ENDPOINT_PORT
      - DEBUG_NETWORK=0
      - JWT_SECRET
      - ADMIN_USER
      - ADMIN_PASS
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_DB: amnezia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:stable
    env_file:
      - .env
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    ports:
      - 80:80
      - 443:443
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
